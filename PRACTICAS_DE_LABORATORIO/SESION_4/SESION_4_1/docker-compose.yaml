services:
  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - app_network

  hola:
    container_name: hola
    image: helloapp:v1
    build:
      context: ./
    environment:
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - app_network
    depends_on:
      - mariadb

  nginx:
    container_name: nginx
    image: nginx:latest
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 80:80
    networks:
      - app_network
    depends_on:
      - hola

networks:
  app_network:
    driver: bridge

volumes:
  mariadb_data:
